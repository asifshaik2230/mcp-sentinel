# H2 file path for local (non-Docker) runs — overridden in docker-compose
spring.datasource.url=jdbc:h2:file:./data/mcp_sentinel;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.application.name=mcp-proxy
server.port=8080

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

mcp.sentinel.cors.allowed-origins=*

logging.level.root=INFO
logging.level.com.mcpsentinel=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
