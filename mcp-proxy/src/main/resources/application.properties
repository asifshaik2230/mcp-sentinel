# H2 file path for local (non-Docker) runs — overridden in docker-compose
spring.datasource.url=jdbc:h2:file:./data/mcp_sentinel;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.application.name=mcp-proxy
server.port=8080

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Dashboard / browser CORS (audit APIs). Execute path uses DnsRebindingFilter.
mcp.sentinel.cors.allowed-origins=http://localhost:8501,http://127.0.0.1:8501

# CVE-2026-11624 — trusted Host / Origin allowlists
mcp.sentinel.dns-rebinding.allowed-hosts=localhost,localhost:8080,127.0.0.1,127.0.0.1:8080,mcp-proxy,mcp-proxy:8080
mcp.sentinel.dns-rebinding.allowed-origins=http://localhost:8501,http://127.0.0.1:8501,http://localhost:8080,http://127.0.0.1:8080,http://mcp-proxy:8080

# OWASP MCP07 — mock OAuth 2.1 FGA token registry (token -> agent + tools)
mcp.sentinel.fga.tok_agent_alpha_read.agent-id=agent-alpha
mcp.sentinel.fga.tok_agent_alpha_read.allowed-tools=read_file,list_dir
mcp.sentinel.fga.tok_agent_beta_search.agent-id=agent-beta
mcp.sentinel.fga.tok_agent_beta_search.allowed-tools=search
mcp.sentinel.fga.tok_agent_gamma_write.agent-id=agent-gamma
mcp.sentinel.fga.tok_agent_gamma_write.allowed-tools=write_file

logging.level.root=INFO
logging.level.com.mcpsentinel=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
